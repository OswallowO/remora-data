# REMORA 雲端籌碼管線 — 每日盤後自動產出 stocklist(跑在 GitHub 雲端,你電腦關機也照跑)
# 部署:把整個 cloud_pipeline_deploy/ 內容放到一個(建議私有)data repo 根目錄,
#       repo Settings → Secrets → Actions 新增 FINMIND_TOKEN。完成後每交易日自動跑。
name: daily-chip-pipeline

on:
  schedule:
    # FinMind 分點日報約「平日 21:00 後」公佈但時間會變動。user 指定:台北 22:30~00:00 每 10 分重試,
    # 沒有最新日期就作罷,每次都寫 data/_fetch_attempts.jsonl(commit 回 repo)記錄 FinMind 實際公佈時間;
    # 抓到當天 stocklist(codes 非空)就跳過(pipeline 內建 skip-if-good)。午夜後下一輪 = 隔日盤前 08:30/08:50/09:00。
    - cron: '30,40,50 14 * * 1-5'  # UTC 14:30/40/50 = 台北 22:30/40/50
    - cron: '*/10 15 * * 1-5'      # UTC 15:00-15:50 = 台北 23:00-23:50(每10分)
    - cron: '0 16 * * 1-5'         # UTC 16:00 = 台北 00:00
    - cron: '30,50 0 * * 1-5'      # UTC 00:30/00:50 = 台北 隔日 08:30/08:50(盤前補跑)
    - cron: '0 1 * * 1-5'          # UTC 01:00 = 台北 隔日 09:00(開盤前最後保險)
  workflow_dispatch:           # 手動觸發(Actions 頁面按 Run workflow);可填日期補抓某天
    inputs:
      date:
        description: '指定日期 YYYY-MM-DD(留空=今天;非交易日會抓到空)'
        required: false
        default: ''

# 讓 workflow 能 push 回 repo
permissions:
  contents: write

# 同一天兩次排程不互相打架
concurrency:
  group: chip-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Run pipeline（抓分點 → 算 achip → 產 stocklist）
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          # 手動觸發填的日期(排程/留空時為空字串 → 腳本自動用今天)
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          python cloud_chip_pipeline.py --out data --syms-file group_syms.txt --top-n 10 --date "$INPUT_DATE"

      - name: Commit data（有變更才 commit）
        run: |
          git config user.name "chip-pipeline-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "今日無新資料(分點可能還沒齊,等補跑)"
          else
            git commit -m "data: $(date -u +%F)"
            # push 前先接遠端,避開「bot 與手動 push / 兩次排程」同時推 main 的競賽
            for i in 1 2 3; do
              git pull --rebase --autostash origin main || true
              if git push; then echo "push 成功"; break; fi
              echo "push 撞車,重試 $i ..."; sleep 3
            done
          fi

# 客戶端下載(raw URL):
#   https://raw.githubusercontent.com/<你的帳號>/<data-repo>/main/data/<YYYY-MM-DD>/stocklist.json
# 私有 repo 的 raw URL 需 token;若想公開下載可把 data repo 設公開(只含籌碼清單,無機密)。
